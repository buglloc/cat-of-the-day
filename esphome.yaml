esphome:
  name: catoftheday
  friendly_name: CatOfTheDay

esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: esp-idf

psram:
  mode: quad
  speed: 80MHz

external_components:
  - source: github://pr#10709
    components: [waveshare_epaper]
    refresh: 1h

# Enable logging
logger:

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  on_connect:
    - component.update: poster_img

http_request:
  id: fetch_image_request
  timeout: 30s

online_image:
  - id: poster_img
    url: "https://storage.yandexcloud.net/cat-of-the-day/poster.bmp"
    format: BMP
    type: RGB
    on_download_finished:
      component.update: poster_display
    on_error:
      then:
        - logger.log: "unable to download poster"

spi:
  clk_pin: GPIO17
  mosi_pin: GPIO16

display:
  - id: poster_display
    platform: waveshare_epaper
    cs_pin: GPIO2
    dc_pin: GPIO41
    busy_pin: GPIO5
    reset_pin: GPIO15
    power_pin: GPIO4
    model: 7.50in-h
    update_interval: never
    lambda: |-
      it.image(0, 0, id(poster_img));
      ESP_LOGD("display", "poster displayed successfully");

deep_sleep:
 run_duration: 180s
 sleep_duration: 28800s # 8h
